name: Chronicle
options:
  bundleIdPrefix: com.chronicle
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    version: 0.15.3

targets:
  Chronicle:
    type: application
    platform: macOS
    sources:
      - path: Chronicle
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chronicle.macos
        INFOPLIST_FILE: Chronicle/Info.plist
        CODE_SIGN_ENTITLEMENTS: Chronicle/Chronicle.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SQLite
    entitlements:
      path: Chronicle/Chronicle.entitlements
